services:
  postgres:
    image: postgres:16
    container_name: tradeai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tradeai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - tradeai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tradeai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tradeai-postgres-data:
